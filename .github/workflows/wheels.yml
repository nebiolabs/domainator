name: Build wheels

# Builds binary wheels (with the optional native `domainator._gbfast` Rust
# extension compiled in) for Linux/macOS/Windows, plus an sdist. Wheels are
# uploaded as artifacts; publishing to PyPI is left to the maintainer (add a
# pypa/gh-action-pypi-publish step gated on a release if desired).
#
# The extension is optional: if a user pip-installs the sdist on a platform with
# no prebuilt wheel and no Rust toolchain, the build still succeeds and domainator
# falls back to its pure-Python / gb-io parsing paths.

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"
  pull_request:
    paths:
      - "rust/**"
      - "pyproject.toml"
      - ".github/workflows/wheels.yml"

jobs:
  build_wheels:
    name: Wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.21
        # All cibuildwheel configuration lives in [tool.cibuildwheel] in
        # pyproject.toml (Python versions, Rust install, test command).

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl

  build_sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pipx run build --sdist
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: ./dist/*.tar.gz
